<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Growth Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Growth Agent</h1>
          <p>个人微信小号推广草稿助手，只生成和记录，不自动发送。</p>
        </div>
        <button class="ghost-button" id="refreshBtn" type="button">刷新</button>
      </header>

      <main class="workspace">
        <aside class="side-panel">
          <section class="panel">
            <div class="section-head">
              <div>
                <h2>小程序自动化</h2>
                <p>先保存小程序资料，再一键生成活动。</p>
              </div>
            </div>

            <div class="scan-card">
              <div class="scan-mark" aria-hidden="true"></div>
              <div>
                <p class="row-title">扫码登录导入</p>
                <p class="row-meta">预留给微信官方授权接口；当前先用资料库稳定切换。</p>
              </div>
              <button class="small-button" data-action="scan-login" type="button">查看</button>
            </div>

            <div class="stack compact-stack">
              <label>
                选择小程序
                <select id="miniappSelect"></select>
              </label>
              <div class="button-row">
                <button class="small-button" data-action="apply-selected-miniapp" type="button">填入活动</button>
                <button class="small-button" data-action="create-selected-miniapp" type="button">直接建活动</button>
              </div>
            </div>

            <div class="miniapp-list" id="miniappList"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>添加小程序</h2>
                <p>换小程序时先加到资料库。</p>
              </div>
            </div>

            <div class="quick-guide">
              <p class="guide-title">常用工具模板</p>
              <div class="preset-grid">
                <button class="small-button" data-miniapp-preset="compress" type="button">图片压缩</button>
                <button class="small-button" data-miniapp-preset="qrcode" type="button">二维码</button>
                <button class="small-button" data-miniapp-preset="wordcount" type="button">字数统计</button>
                <button class="small-button" data-miniapp-preset="teleprompter" type="button">提词器</button>
                <button class="small-button" data-miniapp-preset="grid9" type="button">九宫格</button>
              </div>
            </div>

            <form id="miniappForm" class="stack">
              <label>
                小程序名称
                <input name="appName" required placeholder="图片压缩工具">
              </label>
              <label>
                工具 ID
                <input name="toolId" required placeholder="compress">
                <span class="field-help">英文小写，用来生成来源码，例如 <code>compress</code>。</span>
              </label>
              <label>
                工具名
                <input name="toolName" required placeholder="图片压缩">
              </label>
              <label>
                小程序路径
                <input name="miniappPath" required placeholder="/pages/compress/compress">
                <span class="field-help">通常从 <code>/pages/</code> 开始，不要填网页链接。</span>
              </label>
              <label>
                推广目标
                <textarea name="goal" rows="3" placeholder="帮助用户在微信里快速压缩图片"></textarea>
              </label>
              <label>
                每日上限
                <input name="dailyLimit" type="number" min="1" max="200" value="20">
              </label>
              <button class="primary-button" type="submit">保存到资料库</button>
            </form>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>新建活动</h2>
                <p>从小程序资料自动填入后再按需要改。</p>
              </div>
            </div>

            <form id="campaignForm" class="stack">
              <label>
                活动名
                <input name="name" required placeholder="图片压缩冷启动">
                <span class="field-help">给你自己看的推广计划名称，例如“装修群图片压缩推广”。</span>
              </label>
              <label>
                工具 ID
                <input name="toolId" required placeholder="compress">
              </label>
              <label>
                工具名
                <input name="toolName" required placeholder="图片压缩">
              </label>
              <label>
                小程序路径
                <input name="miniappPath" required placeholder="/pages/compress/compress">
              </label>
              <label>
                推广目标
                <textarea name="goal" rows="3" placeholder="帮助用户在微信里快速压缩图片"></textarea>
              </label>
              <label>
                每日上限
                <input name="dailyLimit" type="number" min="1" max="200" value="20">
              </label>
              <button class="primary-button" type="submit">创建活动</button>
            </form>
          </section>

          <section class="panel">
            <h2>批量添加白名单</h2>
            <form id="targetForm" class="stack">
              <label>
                群/好友/朋友圈名称
                <textarea
                  name="labels"
                  rows="7"
                  required
                  placeholder="每行一个，例如：&#10;A青岛装修合作共赢群&#10;A南京工程装修资源整合群&#10;A深圳装修设计交流群"
                ></textarea>
              </label>
              <p class="helper-text">支持一行一个，也支持用逗号、分号分隔。粘贴很长的 A 开头群列表时，会尝试自动拆开。</p>
              <label>
                类型
                <select name="kind">
                  <option value="group">微信群</option>
                  <option value="friend">好友</option>
                  <option value="moments">朋友圈</option>
                </select>
              </label>
              <label>
                风险等级
                <select name="riskLevel">
                  <option value="low">低</option>
                  <option value="medium">中</option>
                  <option value="high">高</option>
                </select>
              </label>
              <label class="check-row">
                <input name="allowed" type="checkbox" checked>
                允许生成草稿
              </label>
              <label>
                备注
                <textarea name="note" rows="2" placeholder="只发工具分享，不连续刷屏"></textarea>
              </label>
              <button class="primary-button" type="submit">批量加入白名单</button>
            </form>
          </section>
        </aside>

        <section class="main-panel">
          <div class="metrics" id="metrics"></div>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>推广活动</h2>
                <p>为每个活动生成带来源码的小程序路径。</p>
              </div>
            </div>
            <div class="campaign-list" id="campaignList"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>白名单目标</h2>
                <p>只有这里的目标会进入草稿队列，添加错了可以删除。</p>
              </div>
            </div>
            <div class="target-list" id="targetList"></div>
          </section>
        </section>

        <aside class="draft-panel">
          <section class="panel fill-panel">
            <div class="section-head">
              <div>
                <h2>草稿队列</h2>
                <p>复制后到微信里人工确认发送。</p>
              </div>
            </div>
            <div class="draft-list" id="draftList"></div>
          </section>
        </aside>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
