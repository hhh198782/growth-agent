<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Growth Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Growth Agent</h1>
          <p>个人微信小号推广草稿助手，只生成和记录，不自动发送。</p>
        </div>
        <button class="ghost-button" id="refreshBtn" type="button">刷新</button>
      </header>

      <main class="workspace">
        <aside class="side-panel">
          <section class="panel">
            <div class="section-head">
              <div>
                <h2>微信小程序接入</h2>
                <p>粘贴 AppID 和 AppSecret，系统会自动检测授权、导入资料并创建活动。</p>
              </div>
            </div>

            <form id="wechatConnectForm" class="stack">
              <label>
                授权信息
                <textarea
                  name="authorizationText"
                  id="wechatAuthorizationText"
                  rows="5"
                  placeholder="AppID: wx1234567890abcdef&#10;AppSecret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                  autocomplete="off"
                  spellcheck="false"
                ></textarea>
                <span class="field-help">输入完成后会自动检测；密钥只保存在本机 SQLite，不会在页面列表里显示。</span>
              </label>
              <div class="auth-status idle" id="wechatAuthStatus">等待输入 AppID 和 AppSecret</div>
              <div class="button-row">
                <button class="primary-button" type="submit">检测并创建活动</button>
                <button class="small-button" data-action="clear-wechat-auth" type="button">清空</button>
              </div>
            </form>

            <div class="stack compact-stack">
              <label>
                选择小程序
                <select id="miniappSelect"></select>
              </label>
              <div class="button-row single">
                <button class="primary-button" data-action="create-selected-miniapp" type="button">创建活动</button>
              </div>
            </div>

            <div class="miniapp-list" id="miniappList"></div>
          </section>

          <section class="panel">
            <h2>批量添加白名单</h2>
            <form id="targetForm" class="stack">
              <label>
                群/好友/朋友圈名称
                <textarea
                  name="labels"
                  rows="7"
                  required
                  placeholder="每行一个，例如：&#10;A青岛装修合作共赢群&#10;A南京工程装修资源整合群&#10;A深圳装修设计交流群"
                ></textarea>
              </label>
              <p class="helper-text">支持一行一个，也支持用逗号、分号分隔。粘贴很长的 A 开头群列表时，会尝试自动拆开。</p>
              <label>
                类型
                <select name="kind">
                  <option value="group">微信群</option>
                  <option value="friend">好友</option>
                  <option value="moments">朋友圈</option>
                </select>
              </label>
              <label>
                风险等级
                <select name="riskLevel">
                  <option value="low">低</option>
                  <option value="medium">中</option>
                  <option value="high">高</option>
                </select>
              </label>
              <label class="check-row">
                <input name="allowed" type="checkbox" checked>
                允许生成草稿
              </label>
              <label>
                备注
                <textarea name="note" rows="2" placeholder="只发工具分享，不连续刷屏"></textarea>
              </label>
              <button class="primary-button" type="submit">批量加入白名单</button>
            </form>
          </section>
        </aside>

        <section class="main-panel">
          <div class="metrics" id="metrics"></div>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>推广活动</h2>
                <p>为每个活动生成带来源码的小程序路径。</p>
              </div>
            </div>
            <div class="campaign-list" id="campaignList"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>白名单目标</h2>
                <p>只有这里的目标会进入草稿队列，添加错了可以删除。</p>
              </div>
            </div>
            <div class="target-list" id="targetList"></div>
          </section>
        </section>

        <aside class="draft-panel">
          <section class="panel fill-panel">
            <div class="section-head">
              <div>
                <h2>草稿队列</h2>
                <p>复制后到微信里人工确认发送。</p>
              </div>
            </div>
            <div class="draft-list" id="draftList"></div>
          </section>
        </aside>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
